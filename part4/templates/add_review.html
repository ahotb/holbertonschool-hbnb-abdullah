<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HBnB - Add Review</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    {% include 'header.html' %}

    <main>
      <section class="add-review">
        <h1>Add Review</h1>
        <form id="review-form" class="form" method="post" action="#">
          <label for="comment">Comment</label>
          <textarea id="comment" name="comment" rows="5" required></textarea>

          <label>Rating (tap the stars)</label>
          <div id="star-rating" class="star-rating-input" role="group" aria-label="Choose rating from 1 to 5"></div>
          <select id="rating" name="rating" class="sr-only" required aria-label="Rating 1 to 5">
            <option value="">Select rating</option>
            <option value="1">1 - Poor</option>
            <option value="2">2 - Fair</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Very Good</option>
            <option value="5">5 - Excellent</option>
          </select>

          <button type="submit" class="details-button">Submit Review</button>
          <p id="review-message" class="error-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    {% include 'footer.html' %}
    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
  </body>
</html>
